# 本地/腾讯云单机试跑示例：前端 + 需自行提供后端地址
# 全栈同机：先启动 my-agent-sever，再将 API_UPSTREAM 指到宿主机或 compose 服务名

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://43.143.219.22:8000}
    image: my-agent-web:latest
    ports:
      - "8080:80"
    environment:
      # 仅 VITE_API_BASE_URL 留空、走 Nginx 同源反代时生效
      API_UPSTREAM: ${API_UPSTREAM:-https://43.143.219.22:8000}
    restart: unless-stopped
