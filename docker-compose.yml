# 本地/腾讯云单机试跑示例：前端静态服务，API 地址在构建时通过 VITE_API_BASE_URL 写入

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.gyq.asia:8443}
    image: my-agent-web:latest
    ports:
      - "8001:80"
    restart: unless-stopped
